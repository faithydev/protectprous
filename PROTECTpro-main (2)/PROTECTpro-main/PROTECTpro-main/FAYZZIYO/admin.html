<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ProtectPro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-dashboard {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }

        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(10, 14, 23, 0.95);
            border: 1px solid var(--primary);
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 144, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(10, 14, 23, 0.8);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 144, 0.3);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(10, 14, 23, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            background: rgba(0, 255, 144, 0.1);
            color: var(--primary);
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .status-safe {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .section-title {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background: var(--primary);
            color: #000;
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>

    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <h2 class="hero-subtitle">SYSTEM ADMIN</h2>
            <div class="form-group">
                <input type="password" id="adminPass" placeholder="Enter Access Code"
                    style="width: 100%; margin: 20px 0; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white;">
            </div>
            <button class="btn btn-primary" onclick="adminLogin()">Access Dashboard</button>
            <p id="loginError" style="color: var(--danger); margin-top: 10px; display: none;">Access Denied</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="admin-dashboard" id="mainDashboard">
        <div class="header-badge" style="margin-bottom: 20px;"><span data-i18n="hero.status">ADMIN MODE ACTIVE</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="value" id="statUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Scans</h3>
                <div class="value" id="statScans">0</div>
            </div>
            <div class="stat-card">
                <h3>Threats Blocked</h3>
                <div class="value" id="statThreats" style="color: var(--danger);">0</div>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <div class="value" id="statRevenue">$0</div>
            </div>
        </div>

        <div class="section-title">
            <h2>Recent Users</h2>
            <button class="refresh-btn" onclick="loadAdminData()">Refresh Data</button>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Plan</th>
                    <th>Scans (Link/APK)</th>
                    <th>Joined</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <!-- Rows injected by JS -->
            </tbody>
        </table>

        <br><br>

        <div class="section-title">
            <h2>System Logs (Recent Scans)</h2>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Type</th>
                    <th>Target</th>
                    <th>Result</th>
                    <th>User</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <!-- Rows injected by JS -->
            </tbody>
        </table>

        <br>
        <a href="index.html" class="btn btn-secondary">Logout</a>
    </div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
    <script>
        // Inline Admin Script
        const API_ADMIN = 'http://localhost:3000/api/admin';

        function adminLogin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === 'admin123') { // Simple client-side check for demo
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                loadAdminData();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function loadAdminData() {
            try {
                const res = await fetch(`${API_ADMIN}/data`);
                const data = await res.json();

                // Stats
                document.getElementById('statUsers').innerText = data.stats.total_users;
                document.getElementById('statScans').innerText = data.stats.total_scans;
                document.getElementById('statThreats').innerText = data.stats.threats_blocked;

                // Users Table
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';
                data.users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.id.substring(0, 15)}...</td>
                        <td><span class="status-badge" style="background: ${getPlanColor(u.plan)}">${u.plan.toUpperCase()}</span></td>
                        <td>${u.scans}/${u.apk_scans}</td>
                        <td>Now</td>
                         <td><button class="refresh-btn" onclick="upgradeUser('${u.id}')">Upgrade</button></td>
                    `;
                    tbody.appendChild(tr);
                });

                // Logs Table (Mock for now or real if backend sends it)
                const logsBody = document.getElementById('logsTableBody');
                logsBody.innerHTML = '';
                // ... populate if data exists

            } catch (e) {
                console.error("Admin Load Error", e);
            }
        }

        function getPlanColor(plan) {
            if (plan === 'yearly') return 'rgba(168, 85, 247, 0.2)';
            if (plan === 'monthly') return 'rgba(59, 130, 246, 0.2)';
            return 'rgba(107, 114, 128, 0.2)';
        }

        function upgradeUser(uid) {
            // Mock upgrade trigger
            alert('User upgrade feature coming soon!');
        }
    </script>
</body>

</html>
